stages:
  - build
  - docker

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:latest
  DOCKER_TLS_CERTDIR: ""

# -----------------------------
# 1️⃣ .NET Build Stage
# -----------------------------
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "Restoring .NET dependencies..."
    - dotnet restore TestApi/TestApi.csproj
    - echo "Building .NET project..."
    - dotnet build TestApi/TestApi.csproj --configuration Release --no-restore
  artifacts:
    paths:
      - TestApi/bin/Release/net8.0/
    expire_in: 1 hour

# -----------------------------
# 2️⃣ Docker Build & Push Stage
# -----------------------------
docker-build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Logging into GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    
    - echo "Building and Tagging Docker image..."
    # İmajı GitLab Registry adresiyle build ediyoruz
    - docker build -t $IMAGE_NAME ./TestApi
    
    - echo "Pushing image to GitLab Registry..."
    - docker push $IMAGE_NAME
